version: 1
name: Gate fork and join smoke test
sessions:
  judge:
    agentServerId: claude-acp
nodes:
  route:
    kind: input
    alias: IN
    title: Requested branch
    variableName: specflow_route
    defaultValue: rework
    description: Use pass or rework to select the expected branch.
  source:
    kind: step
    alias: "01"
    title: Publish route fact
    prompt: |-
      Do not use tools or edit files.
      The requested route is "<specflow_route>".
      If it is exactly "pass", reply exactly ROUTE=pass.
      For every other value, reply exactly ROUTE=rework.
    session: judge
  decide:
    kind: gate
    alias: G1
    title: Select requested route
    decisionCriteria: |-
      Choose pass only when the preceding output is exactly ROUTE=pass.
      Choose rework only when the preceding output is exactly ROUTE=rework.
    branches:
      pass:
        description: The published fact selected the passing path.
      rework:
        description: The published fact selected the rework path.
  pass-path:
    kind: step
    alias: 02A
    title: Pass branch marker
    prompt: |-
      Do not use tools or edit files.
      Reply exactly SELECTED_BRANCH=pass.
    session: judge
  rework-path:
    kind: step
    alias: 02B
    title: Rework branch marker
    prompt: |-
      Do not use tools or edit files.
      Reply exactly SELECTED_BRANCH=rework.
    session: judge
  joined:
    kind: step
    alias: "03"
    title: Joined completion marker
    prompt: |-
      Do not use tools or edit files.
      Reply exactly JOIN_REACHED.
    session: judge
  done:
    kind: end
    alias: END
    title: Done
edges:
  - from: route
    to: source
  - from: source
    to: decide
  - from: decide
    to: pass-path
    branch: pass
  - from: decide
    to: rework-path
    branch: rework
  - from: pass-path
    to: joined
  - from: rework-path
    to: joined
  - from: joined
    to: done
