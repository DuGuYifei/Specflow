version: 1
name: Simple mock agent flow
sessions:
  codex-acp:
    agentServerId: codex-acp
  claude-acp:
    agentServerId: claude-acp
nodes:
  in1:
    kind: input
    num: IN
    title: Input value
    variableName: specflow_value
    description: Value used by the first step
  n1:
    kind: step
    num: "01"
    title: Add one
    prompt: 1 + <specflow_value> = ?
    session: codex-acp
    paths: []
  n2:
    kind: step
    num: "02"
    title: Add two
    prompt: |-
      Continue with the previous result in this session.
      + 2 = ?
    session: codex-acp
  end1:
    kind: end
    num: END
    title: Done
edges:
  - from: in1
    to: n1
  - from: n1
    to: n2
  - from: n2
    to: end1
