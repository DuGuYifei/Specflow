version: 1
name: Simple paused Codex flow
sessions:
  codex:
    agentServerId: codex-acp
  claude:
    agentServerId: claude-acp
nodes:
  input-value:
    kind: input
    alias: IN
    title: Input value
    variableName: specflow_value
    defaultValue: "1"
    description: Value used by the arithmetic steps.
  add-one:
    kind: step
    alias: "01"
    title: Add one and pause
    prompt: Calculate 1 + <specflow_value>.
    session: codex
    pauseAfterRun: true
    modeId: full-access
    configOptions:
      model: gpt-5.5
      reasoning_effort: low
  add-two:
    kind: step
    alias: "02"
    title: Continue arithmetic
    prompt: Add 2 to the previous result and reply with only the final arithmetic
      statement.
    session: codex
  done:
    kind: end
    alias: END
    title: Done
edges:
  - from: input-value
    to: add-one
  - from: add-one
    to: add-two
  - from: add-two
    to: done
