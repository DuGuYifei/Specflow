version: 1
name: Frontend ticket flow
sessions:
  parser:
    agentServerId: codex-acp
  builder:
    agentServerId: codex-acp
  reviewer:
    agentServerId: codex-acp
  interview:
    agentServerId: codex-acp
  plan-code:
    agentServerId: codex-acp
nodes:
  n1:
    kind: step
    alias: "01"
    title: Ticket
    prompt: |-
      Inspect the incoming ticket, including title, description, linked issue context and attached screenshots.
      Return a compact, evidence-grounded ticket brief with the requested UI change, visible constraints, source artifacts, and open questions.
      Do not edit files in this intake step.
    session: parser
    locked: true
    images:
      - path: .aflow/.specflow/assets/example-code-frontend-flow/images/ticket.png
        label: ticket.png
        mimeType: image/png
    paths:
      - /issues/PROD-2841
  n2a:
    kind: step
    alias: 02·a
    title: Parse image components
    prompt: |-
      Use the ticket brief and screenshot to identify the UI component tree, visual regions, states, spacing, typography and reusable design-system pieces.
      Return structured component notes that can be handed to an implementation agent.
    session: parser
    paths:
      - design/figma-export.json
  n2b:
    kind: step
    alias: 02·b
    title: Generate HTML
    prompt: |-
      Use <specflow_component_tree> and the project design-system context to implement the requested component draft.
      Keep edits scoped to the declared component paths. Return changed files, assumptions, and verification notes.
    session: builder
    paths:
      - src/components/
  n2c:
    kind: step
    alias: 02·c
    title: Agent reviews component
    prompt: |-
      Review <specflow_draft_html> against the ticket screenshot and requested behavior.
      Identify visual regressions, missing states, accessibility concerns and concrete fixes. Do not rewrite the implementation unless a tiny obvious correction is required.
    session: reviewer
  g1:
    kind: gate
    alias: G1
    title: Component review verdict
    decisionCriteria: Decide whether the generated component faithfully matches the
      ticket screenshot. Choose pass when visual regressions are absent and
      intent is preserved; rework when meaningful divergence remains.
    branches:
      pass: {}
      rework: {}
      fail: {}
  n3a:
    kind: step
    alias: 03·a
    title: Interview · feature & task
    prompt: |-
      Use <specflow_review_findings> to ask only targeted clarification questions about feature scope, user intent and acceptance criteria.
      Keep the interview concise and record answers as explicit facts or unknowns.
    session: interview
    locked: true
  n3b:
    kind: step
    alias: 03·b
    title: Interview · edge cases
    prompt: Probe for exception cases, failure modes, accessibility requirements, responsive behavior and boundary data states.
    session: interview
    locked: true
  n3c:
    kind: step
    alias: 03·c
    title: Summarize interview
    prompt: Consolidate the interview into a structured implementation brief with facts, decisions, remaining unknowns and acceptance criteria.
    session: interview
    locked: true
  n4a:
    kind: step
    alias: 04·a
    title: Plan
    prompt: |-
      Break <specflow_spec_brief> into ordered, file-scoped implementation steps.
      Include acceptance checks, verification commands and risks. Do not edit files in this planning step.
    session: plan-code
  n4b:
    kind: step
    alias: 04·b
    title: Code
    prompt: |-
      Implement the approved plan. Touch only files needed for the requested UI change.
      Return changed files, verification output and any incomplete acceptance criteria.
    session: plan-code
    paths:
      - src/
      - tests/
  n4c:
    kind: step
    alias: 04·c
    title: Review
    prompt: |-
      Review <specflow_diff>. Run relevant tests, lint or type-check commands when available, verify the acceptance criteria and inspect for regressions.
      Begin with a clear pass/rework/replan recommendation and the evidence behind it.
    session: reviewer
  g2:
    kind: gate
    alias: G2
    title: Implementation verdict
    decisionCriteria: Decide whether implementation passes review. Pass when tests,
      lint, types green and acceptance criteria met; rework when fixable; replan
      when scope or approach was wrong.
    branches:
      pass: {}
      rework: {}
      replan: {}
  end1:
    kind: end
    alias: END
    title: Done
edges:
  - from: n1
    to: n2a
  - from: n2a
    to: n2b
    transmit: true
    outputTag: component_tree
    handoffPrompt: Forward the parsed component tree as JSON, preserving nesting.
  - from: n2b
    to: n2c
    transmit: true
    outputTag: draft_html
    handoffPrompt: Send the generated HTML draft for visual review.
  - from: n2c
    to: g1
  - from: g1
    to: n3a
    branch: pass
    transmit: true
    outputTag: review_findings
    handoffPrompt: Summarize review findings for the interview step.
  - from: g1
    to: n2b
    branch: rework
    loopback: true
  - from: g1
    to: n2a
    branch: fail
    loopback: true
  - from: n3a
    to: n3b
  - from: n3b
    to: n3c
  - from: n3c
    to: n4a
    transmit: true
    outputTag: spec_brief
    handoffPrompt: Hand the final interview brief to planning.
  - from: n4a
    to: n4b
  - from: n4b
    to: n4c
    transmit: true
    outputTag: diff
    handoffPrompt: Forward the resulting diff plus test outputs for review.
  - from: n4c
    to: g2
  - from: g2
    to: end1
    branch: pass
  - from: g2
    to: n4b
    branch: rework
    loopback: true
  - from: g2
    to: n4a
    branch: replan
    loopback: true
