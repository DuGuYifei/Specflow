version: 1
name: Simple mock agent flow
sessions:
  mock-main:
    agentServerId: codex-acp
  claude-acp:
    agentServerId: claude-acp
nodes:
  in1:
    kind: input
    num: IN
    title: Input value
    variableName: specflow_value
    description: Value used by the first step
  n1:
    kind: step
    num: "01"
    title: Add one
    desc: 1 + <specflow_value> = ?
    session: claude-acp
    updateDoc: false
    paths: []
  n2:
    kind: step
    num: "02"
    title: Add two
    desc: |-
      Previous output: <specflow_input>
      + 2 = ?
    session: claude-acp
    updateDoc: false
  end1:
    kind: end
    num: END
    title: Done
edges:
  - from: in1
    to: n1
    sameSession: false
  - from: n1
    to: n2
    sameSession: true
  - from: n2
    to: end1
