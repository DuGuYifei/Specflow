id: simple-agent-flow
name: Simple mock agent flow
sessions:
  - id: s1
    name: mock-main
    color: oklch(0.7 0.13 250)
    agent: mock
nodes:
  - kind: input
    id: in1
    num: IN
    title: Input value
    variableName: specflow_value
    description: Value used by the first step
    sessionId: null
  - kind: step
    id: n1
    num: "01"
    title: Add one
    desc: 1 + <specflow_value> = ?
    sessionId: s1
    updateDoc: false
  - kind: step
    id: n2
    num: "02"
    title: Add two
    desc: |-
      Previous output: <specflow_input>
      + 2 = ?
    sessionId: s1
    updateDoc: false
  - kind: end
    id: end1
    num: END
    title: Done
    sessionId: null
edges:
  - id: e-input-1
    from: in1
    to: n1
  - id: e1
    from: n1
    to: n2
    sameSession: true
  - id: e2
    from: n2
    to: end1
