version: 1
name: Create a commercial project homepage
sessions:
  homepage-researcher:
    agentServerId: codex-acp
  homepage-strategist:
    agentServerId: codex-acp
  homepage-designer:
    agentServerId: codex-acp
  homepage-visual-researcher:
    agentServerId: codex-acp
  homepage-builder:
    agentServerId: codex-acp
  homepage-reviewer:
    agentServerId: codex-acp
nodes:
  source-project-path:
    kind: input
    num: IN
    title: Source project directory
    variableName: specflow_source_project_path
    description: Absolute directory of the read-only source project. The flow
      verifies that Codex can read it before making public claims; output is
      written only to the current workspace.
  homepage-direction:
    kind: input
    num: IN
    title: Homepage direction
    variableName: specflow_homepage_direction
    defaultValue: Build a premium, credible landing page for a developer-facing
      software product. Prefer a focused single-page site with a strong product
      visual, restrained motion, responsive behavior, and only evidence-backed
      claims.
    description: Override with audience, brand, CTA, language, framework, or
      delivery requirements.
  page-languages:
    kind: input
    num: IN
    title: Page languages
    variableName: specflow_page_languages
    defaultValue: zh-CN and en-US with a visible language switcher; both versions
      must be complete, natural, and evidence-backed.
    description: Use zh-CN, en-US, or a bilingual requirement. The default produces
      a complete Chinese and English landing page.
  inspect-source:
    kind: step
    num: "01"
    title: Validate and inspect source
    prompt: >-
      You are researching a software product in order to build its public-facing
      homepage.


      SOURCE PROJECT (read-only): <specflow_source_project_path>

      HOMEPAGE DIRECTION: <specflow_homepage_direction>

      REQUIRED PAGE LANGUAGES: <specflow_page_languages>

      OUTPUT WORKSPACE: the current working directory where this Specflow run is
      executing.


      First validate access to SOURCE PROJECT. It must exist, be readable, and
      be distinct from OUTPUT WORKSPACE. Never write, format, install
      dependencies, or generate files inside SOURCE PROJECT.


      If you cannot read the source project safely, begin your response with
      exactly "readiness: blocked" and explain the required path correction or
      execution-environment access change. Do not infer product claims.


      If it is accessible, begin with exactly "readiness: ready" and perform an
      evidence-driven, read-only discovery pass. Inspect README files, .specflow
      product/architecture/glossary/conventions notes, docs/ and ADRs,
      package/build manifests, primary entrypoints, visible UI
      components/styles/assets, screenshots or brand assets, and install/run
      instructions. Ignore dependencies, generated builds, caches, runs,
      secrets, and irrelevant internal churn.


      Return a source dossier containing:

      - product category, target user, problem, workflow, differentiators, and
      credible CTA options;

      - concrete source paths supporting each public claim;

      - existing brand tokens/assets or UI motifs worth translating into a hero
      visual;

      - commands or links that are safe to publish;

      - missing evidence and claims that must not appear, including invented
      customers, metrics, pricing, compliance, testimonials, or integrations.
    session: homepage-researcher
  source-readiness:
    kind: gate
    num: G1
    title: Source usable?
    decisionCriteria: 'Read the first classification line from the source dossier.
      Choose ready only if it begins with "readiness: ready" and contains
      evidence sufficient to market the product without fabrication. Choose
      blocked if it begins with "readiness: blocked", the source path is
      inaccessible, the source equals the output workspace, or credible product
      facts cannot be established.'
    branches:
      ready: {}
      blocked: {}
  report-blocked:
    kind: step
    num: STOP
    title: Report setup required
    prompt: "The source-project preflight did not pass. Do not create a speculative
      landing page. Summarize exactly how to make the next run actionable: use
      an absolute source project path, ensure Codex can read it in the current
      execution environment, keep it separate from the empty output workspace,
      and rerun this flow. Do not edit project files."
    session: homepage-researcher
  study-product-visuals:
    kind: step
    num: "02"
    title: Study UI and visual assets
    prompt: >-
      Use <specflow_source_dossier> as the factual basis. Work read-only in the
      source project and investigate how this product can be shown rather than
      merely described.


      Inspect visible application surfaces, routes/pages, components, styles,
      design tokens, icons/logos, diagrams, existing screenshots or demos, and
      build/run instructions relevant to presenting the UI. If the product can
      safely be run for visual inspection, identify the command and the exact
      screen worth capturing; do not alter source data or invent a screen.


      Choose an evidence-backed visual media strategy:

      - reuse a permitted existing screenshot or product asset when one is
      available and genuinely representative;

      - capture a real non-sensitive product screen only if running/capturing is
      feasible in this environment and the generated homepage can store the
      resulting asset in its output workspace;

      - otherwise create a static product preview in HTML/CSS/SVG derived from
      real UI structure, terminology and design tokens.


      A landing-page preview is illustrative media, not a fake interactive
      product. Small presentational motion (for example a restrained glow,
      progress trace, or panel transition) is acceptable only when it reinforces
      real workflow concepts and respects reduced-motion preferences. Do not
      imply live operation, invent screens, or copy unlicensed assets.


      Return a visual evidence report: examined source paths, usable assets,
      capture feasibility, selected hero/media strategy, real UI details to
      preserve, permitted presentational motion, and forbidden fabrication.
    session: homepage-visual-researcher
  position-product:
    kind: step
    num: "03"
    title: Define positioning and copy
    prompt: >-
      Use <specflow_source_dossier> as the only factual basis and apply these
      constraints:

      <specflow_homepage_direction>

      Required output languages: <specflow_page_languages>


      Act as a senior developer-product marketing strategist. Convert technical
      evidence into a concise homepage messaging brief for a mature commercial
      software landing page. Define the audience, one-sentence positioning,
      primary outcome, hero headline and subhead options, primary/secondary CTA
      copy and truthful destinations, three to five capability narratives, a
      workflow story, and a final CTA.


      Commercial-quality pages for developer tools generally use an outcome-led
      hero, an authentic product visualization, scannable capability chapters,
      proof or trust only where verifiable, clear docs/install pathways, and a
      strong closing CTA. Apply that information architecture without copying
      another brand.


      Truthfulness is mandatory. Every claim must cite the supporting source
      path from the dossier. Omit testimonials, logo walls, usage metrics,
      security badges, enterprise claims, pricing and integration lists unless
      directly evidenced. Mark any attractive but unsupported concept as
      prohibited copy. Produce final-quality copy for every required language,
      preserving meaning rather than translating mechanically. Return a copy
      deck plus an evidence/prohibition table.
    session: homepage-strategist
  design-blueprint:
    kind: step
    num: "04"
    title: Design page blueprint
    prompt: >-
      Use <specflow_positioning_brief> and <specflow_visual_evidence> to produce
      a detailed landing-page blueprint that an implementation agent can execute
      precisely. Required languages: <specflow_page_languages>.


      Specify:

      - page section order, purpose, final draft copy, CTA locations, and
      evidence constraints;

      - a premium developer-tool visual direction: typography hierarchy, spacing
      rhythm, color tokens, surfaces, border/radius system, background
      treatment, icon approach, and restrained interaction/motion;

      - a hero product visual derived from real product behavior, such as a
      workflow canvas, code/terminal sequence, execution timeline, or UI panel,
      using only HTML/CSS/SVG and text supported by source evidence;

      - desktop, tablet and mobile layout behavior; navigation, footer,
      accessibility semantics, focus/hover states, reduced-motion behavior,
      performance limits and SEO metadata;

      - an implementation component outline and reusable design tokens.

      For multilingual delivery, specify language switching behavior, initial
      locale behavior, complete copy mapping, language-appropriate typography,
      and how metadata/accessibility text is localized. No language may be a
      placeholder or partial translation.


      The result should feel comparable in polish and information structure to a
      modern commercial developer-product homepage, while remaining original and
      factual. Do not request external images, invented screenshots, fabricated
      social proof, or copyrighted competitor assets. Return an
      implementation-ready creative brief with exact sections and copy.
    session: homepage-designer
  audit-blueprint:
    kind: step
    num: "05"
    title: Audit claims and UX brief
    prompt: >-
      Review whichever populated blueprint is provided:
      <specflow_page_blueprint> <specflow_revised_blueprint>

      Act as a strict product, content and UX auditor before any code is
      written. Required languages: <specflow_page_languages>.


      Check that every product statement and CTA in every language is grounded
      in the source dossier, the structure is persuasive rather than
      documentation-like, the hero visual communicates real product value, the
      page has a coherent responsive design system, accessibility and
      reduced-motion requirements are actionable, selected imagery/visualization
      is supported by the visual evidence report, and forbidden unsourced proof
      is absent.


      Correct any weak, generic, unsupported, or overly technical copy directly
      in your output. Produce one final approved build specification: exact
      section order and text, design-token requirements, UI mock content,
      permitted source references/assets, banned claims, file-level
      implementation acceptance criteria, and a verification checklist. Begin
      with exactly "verdict: approve" if this is ready to build. Begin with
      exactly "verdict: revise" if substantial design, localization or media
      corrections are still required; include a complete file-ready correction
      brief.
    session: homepage-reviewer
  blueprint-decision:
    kind: gate
    num: G2
    title: Blueprint approved?
    decisionCriteria: 'Choose approve only when the blueprint audit begins with
      "verdict: approve". Choose revise when it begins with "verdict: revise",
      required language or evidence defects remain, and revise is an available
      branch. Choose unresolved when defects remain but the revise branch is no
      longer available.'
    branches:
      approve: {}
      revise: {}
      unresolved: {}
  revise-blueprint:
    kind: step
    num: 06R
    title: Revise rejected blueprint
    prompt: "Use <specflow_blueprint_findings> and the preceding visual-design
      context in this session. Revise the entire landing-page blueprint before
      implementation. Resolve every localized copy, evidence, screenshot/static
      preview, visual hierarchy, accessibility and implementation acceptance
      defect identified by review. Preserve the required languages:
      <specflow_page_languages>. Return a complete replacement blueprint, not a
      patch list."
    session: homepage-designer
  report-blueprint-unresolved:
    kind: step
    num: STOP
    title: Report unresolved design review
    prompt: Continue from the unresolved blueprint audit in this session. Produce an
      honest design review report for the user. Do not proceed to implementation
      or claim that a homepage is ready. State the remaining localization,
      product-evidence, visual-media or accessibility defects that require
      manual direction.
    session: homepage-reviewer
  plan-site:
    kind: step
    num: "08"
    title: Plan target implementation
    prompt: >-
      Use the approved specification in <specflow_approved_homepage_spec>.
      Required languages: <specflow_page_languages>. You are the implementation
      owner working only in OUTPUT WORKSPACE, never in SOURCE PROJECT
      (<specflow_source_project_path>).


      Inspect the output workspace and determine its delivery shape. If it
      already contains an intentional frontend scaffold, preserve its toolchain,
      conventions and build path. If it is empty apart from .specflow files,
      produce a dependency-free responsive static site using index.html,
      styles.css, optional main.js and an output README with preview
      instructions; do not require package installation merely to view the
      landing page.


      Before editing, return a short implementation plan naming the files to
      create or change, component/section structure, asset strategy, commands
      available for verification, and how the approved copy and design tokens
      map into the files. No edits in this planning step.
    session: homepage-builder
  build-site:
    kind: step
    num: "09"
    title: Build landing page
    prompt: >-
      Implement the approved homepage according to the plan already established
      in this session.


      Requirements:

      - write only inside OUTPUT WORKSPACE and never modify
      <specflow_source_project_path>;

      - implement every approved section and CTA with factual copy in all
      required languages (<specflow_page_languages>), including a usable
      language switcher when more than one language is required;

      - create the approved expressive hero media: use a permitted real product
      screenshot/captured screen when available, or an original static
      HTML/CSS/SVG product preview grounded in real UI evidence;

      - use well-factored semantic markup/components and centralized design
      tokens;

      - implement responsive desktop/tablet/mobile layouts, accessible
      navigation and controls, keyboard focus visibility, usable contrast,
      reduced-motion support, metadata and a polished footer;

      - avoid generic AI-generated decoration, placeholder copy, fake links,
      fabricated logos/testimonials/metrics, and unnecessary dependencies.


      Run whatever local formatting/build or static validation is already
      supported. Return changed files, preview/run instructions, validation
      results, and any constraint that prevented complete implementation.
    session: homepage-builder
  polish-experience:
    kind: step
    num: "10"
    title: Polish visual experience
    prompt: >-
      Use <specflow_implementation_report>, then open the generated site files
      in OUTPUT WORKSPACE and conduct a visual-design implementation pass.


      Improve the actual files where needed: hierarchy, whitespace, typography
      scale, color and contrast, hero composition, card rhythm, navigation and
      CTA prominence, breakpoint behavior, small-screen readability,
      hover/focus/reduced-motion states, and developer-tool authenticity. Verify
      that the page presents a coherent narrative from hero through final CTA
      and does not look like a template.


      Preserve factual copy and do not alter the source project. Do not add
      unverified trust claims or external copyrighted media. Verify every
      required language and any locale switcher. Return a concise polish report
      listing edits, remaining concerns and recommended verification commands.
    session: homepage-designer
  verify-release:
    kind: step
    num: "11"
    title: Verify release quality
    prompt: >-
      Use whichever implementation report is populated: <specflow_polish_report>
      <specflow_repair_report>

      Perform a rigorous release review of the generated landing page in OUTPUT
      WORKSPACE. Required languages: <specflow_page_languages>.


      Inspect the implemented source and run the relevant available validation
      or build commands. Assess: content traceability to source evidence;
      absence of fabricated claims and broken CTAs; section completeness against
      the approved spec; semantic HTML and keyboard/focus behavior; contrast and
      reduced-motion handling; responsive behavior at narrow and wide layouts;
      asset/load hygiene; localized content and language switching; evidence
      basis and non-deceptive presentation of screenshots or static product
      previews; metadata; and whether the hero and overall page meet a
      commercial developer-product quality bar.


      Fix only small, obvious defects directly if that completes the review.
      Begin the response with exactly "verdict: pass" only if the page is ready
      to present, or "verdict: fix" followed by a prioritized, file-specific
      correction list if substantial work remains.
    session: homepage-reviewer
  release-decision:
    kind: gate
    num: G3
    title: Release verdict
    decisionCriteria: 'Choose pass only when the incoming review begins with
      "verdict: pass". Choose fix when it begins with "verdict: fix", defects
      remain, and fix is an available branch. Choose unresolved when defects
      remain but the fix branch is no longer available.'
    branches:
      pass: {}
      fix: {}
      unresolved: {}
  repair-site:
    kind: step
    num: "12"
    title: Repair release issues
    prompt: Use <specflow_release_findings>. Repair all substantive release issues
      in OUTPUT WORKSPACE while preserving the approved truthful messaging and
      original design direction. Make concrete file edits, rerun applicable
      validation, and return a final repair report with changed files,
      tests/build output, and any unresolved limitation. Never modify SOURCE
      PROJECT (<specflow_source_project_path>).
    session: homepage-builder
  report-unresolved:
    kind: step
    num: STOP
    title: Report unresolved quality issues
    prompt: Continue from the unresolved design or release review in this session.
      Produce an honest delivery report for the user. Do not claim that the
      homepage is ready. State the remaining content, localization,
      visual-media, accessibility or build defects and which files need manual
      follow-up.
    session: homepage-reviewer
  homepage-ready:
    kind: end
    num: END
    title: Homepage ready
  homepage-blocked:
    kind: end
    num: END
    title: Setup required
  homepage-unresolved:
    kind: end
    num: END
    title: Manual follow-up required
edges:
  - from: source-project-path
    to: inspect-source
  - from: homepage-direction
    to: inspect-source
  - from: page-languages
    to: inspect-source
  - from: inspect-source
    to: source-readiness
  - from: source-readiness
    to: position-product
    transmit: true
    outputTag: source_dossier
    handoffPrompt: Forward the validated source dossier for evidence-grounded
      homepage positioning.
    branch: ready
  - from: source-readiness
    to: study-product-visuals
    transmit: true
    outputTag: source_dossier
    handoffPrompt: Forward the validated dossier for read-only UI and visual asset
      investigation.
    branch: ready
  - from: source-readiness
    to: report-blocked
    branch: blocked
  - from: report-blocked
    to: homepage-blocked
  - from: position-product
    to: design-blueprint
    transmit: true
    outputTag: positioning_brief
    handoffPrompt: Forward the evidence-backed messaging and claims constraints into
      page design.
  - from: study-product-visuals
    to: design-blueprint
    transmit: true
    outputTag: visual_evidence
    handoffPrompt: Forward verified UI evidence and the permitted hero media
      strategy for page design.
  - from: design-blueprint
    to: audit-blueprint
    transmit: true
    outputTag: page_blueprint
    handoffPrompt: Forward the full creative blueprint for strict content and UX
      approval. The reviewer is in a separate session and cannot see the design
      conversation. Reproduce the complete reviewable blueprint, including
      evidence references, localized copy, visual specification, design tokens,
      accessibility requirements and acceptance criteria; never refer to prior
      messages in place of content.
  - from: audit-blueprint
    to: blueprint-decision
  - from: blueprint-decision
    to: plan-site
    transmit: true
    outputTag: approved_homepage_spec
    handoffPrompt: Forward the corrected, approved implementation specification.
    branch: approve
  - from: blueprint-decision
    to: revise-blueprint
    transmit: true
    outputTag: blueprint_findings
    handoffPrompt: Forward the rejected blueprint audit and required corrections for
      a complete design revision. The designer is in a separate session; include
      the complete actionable audit findings and required populated fields
      rather than referring to the review conversation.
    branch: revise
    maxTraversals: 2
  - from: revise-blueprint
    to: audit-blueprint
    transmit: true
    outputTag: revised_blueprint
    handoffPrompt: Forward the revised localized and evidence-grounded blueprint for
      another independent approval review. The reviewer cannot see any preceding
      designer messages. Reproduce the complete replacement blueprint and all
      evidence, copy, visual, accessibility and implementation details required
      for approval in this handoff response.
    loopback: true
  - from: blueprint-decision
    to: report-blueprint-unresolved
    branch: unresolved
  - from: report-blueprint-unresolved
    to: homepage-unresolved
  - from: plan-site
    to: build-site
  - from: build-site
    to: polish-experience
    transmit: true
    outputTag: implementation_report
    handoffPrompt: Forward the built-page report for visual refinement in the output
      workspace.
  - from: polish-experience
    to: verify-release
    transmit: true
    outputTag: polish_report
    handoffPrompt: Forward the complete polished implementation report for release
      verification. The reviewer is in a separate session; include all changed
      files, validation results, constraints and evidence needed to judge
      release readiness without referring to prior messages.
  - from: verify-release
    to: release-decision
  - from: release-decision
    to: homepage-ready
    branch: pass
  - from: release-decision
    to: repair-site
    transmit: true
    outputTag: release_findings
    handoffPrompt: Forward the complete file-specific release defects for
      implementation repair. The builder is in a separate session; reproduce
      each actionable issue and acceptance condition rather than referencing
      prior review output.
    branch: fix
    maxTraversals: 2
  - from: repair-site
    to: verify-release
    transmit: true
    outputTag: repair_report
    handoffPrompt: Forward repaired files and validation results for another
      independent release review. The reviewer is in a separate session; include
      the complete repair report, changed files, validation output and remaining
      limitations required for approval.
    loopback: true
  - from: release-decision
    to: report-unresolved
    branch: unresolved
  - from: report-unresolved
    to: homepage-unresolved
