id: wf1
name: Frontend ticket flow
sessions:
  - id: s1
    name: parser
    color: oklch(0.78 0.13 45)
    agent: claude-code
  - id: s2
    name: builder
    color: oklch(0.74 0.13 145)
    agent: claude-code
  - id: s3
    name: reviewer
    color: oklch(0.74 0.13 230)
    agent: codex
  - id: s4
    name: interview
    color: oklch(0.74 0.13 300)
    agent: claude-code
  - id: s5
    name: plan-code
    color: oklch(0.78 0.13 80)
    agent: claude-code
nodes:
  - kind: step
    id: n1
    num: "01"
    x: 26
    y: -77
    w: 230
    title: Ticket
    desc: Capture the incoming ticket — title, description, attached screenshots.
    attachments:
      - label: ticket.png
    paths:
      - /issues/PROD-2841
    sessionId: s1
    updateDoc: false
    locked: true
  - kind: step
    id: n2a
    num: 02·a
    x: 465
    y: -142
    w: 220
    title: Parse image components
    desc: Vision pass over the ticket screenshot. Identify named components and
      regions.
    paths:
      - design/figma-export.json
    sessionId: s1
    updateDoc: false
  - kind: step
    id: n2b
    num: 02·b
    x: 852.1449263842359
    y: -90.3016497764697
    w: 220
    title: Generate HTML
    desc: Synthesize draft HTML reproducing the parsed component tree using the
      project DS.
    paths:
      - src/components/
    sessionId: s2
    updateDoc: true
  - kind: step
    id: n2c
    num: 02·c
    x: 428
    y: 132
    w: 220
    title: Agent reviews component
    desc: Reviewer agent diffs draft HTML against the source image and surfaces
      visual regressions.
    sessionId: s3
    updateDoc: false
  - kind: gate
    id: g1
    num: G1
    x: 1130
    y: 100
    w: 200
    title: Component review verdict
    gateDesc: Decide whether the generated component faithfully matches the ticket
      screenshot. Choose pass when visual regressions are absent and intent is
      preserved; rework when meaningful divergence remains.
    branches:
      - id: pass
        label: pass
        color: oklch(0.62 0.11 145)
      - id: rework
        label: rework
        color: oklch(0.72 0.13 80)
      - id: fail
        label: fail
        color: oklch(0.58 0.16 25)
    sessionId: s3
  - kind: step
    id: n3a
    num: 03·a
    x: 340
    y: 360
    w: 230
    title: Interview · feature & task
    desc: Targeted Q&A clarifying feature scope and the specific task being
      requested.
    sessionId: s4
    updateDoc: true
    locked: true
  - kind: step
    id: n3b
    num: 03·b
    x: 610
    y: 360
    w: 230
    title: Interview · edge cases
    desc: Probe for exception cases, failure modes, and boundary behavior.
    sessionId: s4
    updateDoc: true
    locked: true
  - kind: step
    id: n3c
    num: 03·c
    x: 880
    y: 360
    w: 230
    title: Summarize interview
    desc: Consolidate Q&A into a structured spec brief.
    attachments:
      - label: brief.md
    sessionId: s4
    updateDoc: true
    locked: true
  - kind: step
    id: n4a
    num: 04·a
    x: 340
    y: 600
    w: 220
    title: Plan
    desc: Break the brief into ordered, file-scoped implementation steps with
      explicit acceptance.
    sessionId: s5
    updateDoc: true
  - kind: step
    id: n4b
    num: 04·b
    x: 600
    y: 600
    w: 220
    title: Code
    desc: Author implementation against the plan. Touches only declared files.
    paths:
      - src/
      - tests/
    sessionId: s5
    updateDoc: true
  - kind: step
    id: n4c
    num: 04·c
    x: 860
    y: 600
    w: 220
    title: Review
    desc: "Self-review pass: run tests, lint, type-check, verify acceptance."
    sessionId: s3
    updateDoc: false
  - kind: gate
    id: g2
    num: G2
    x: 1130
    y: 620
    w: 200
    title: Implementation verdict
    gateDesc: Decide whether implementation passes review. Pass when tests, lint,
      types green and acceptance criteria met; rework when fixable; replan when
      scope or approach was wrong.
    branches:
      - id: pass
        label: pass
        color: oklch(0.62 0.11 145)
      - id: rework
        label: rework
        color: oklch(0.72 0.13 80)
      - id: replan
        label: replan
        color: oklch(0.62 0.13 230)
    sessionId: s3
  - kind: end
    id: end1
    num: END
    x: 1410
    y: 640
    w: 140
    title: Done
    sessionId: null
edges:
  - id: e1
    from: n1
    to: n2a
    tag: ticket
    prompt: Pass the raw ticket payload (title, body, attachments).
    sameSession: true
  - id: e2
    from: n2a
    to: n2b
    tag: component_tree
    prompt: Forward the parsed component tree as JSON, preserving nesting.
  - id: e3
    from: n2b
    to: n2c
    tag: draft_html
    prompt: Send the generated HTML draft for visual review.
  - id: e4
    from: n2c
    to: g1
    tag: review_findings
    prompt: Forward findings to the gate for verdict.
    sameSession: true
  - id: e5
    from: g1
    to: n3a
    branch: pass
  - id: e6
    from: g1
    to: n2b
    branch: rework
    loopback: true
  - id: e7
    from: g1
    to: n2a
    branch: fail
    loopback: true
  - id: e8
    from: n3a
    to: n3b
    tag: feature_summary
    prompt: Carry forward agreed feature scope.
    sameSession: true
  - id: e9
    from: n3b
    to: n3c
    tag: edge_cases
    prompt: Pass enumerated edge cases for consolidation.
    sameSession: true
  - id: e10
    from: n3c
    to: n4a
    tag: spec_brief
    prompt: Hand the final interview brief to planning.
  - id: e11
    from: n4a
    to: n4b
    tag: plan
    prompt: Pass the ordered implementation plan with file targets.
    sameSession: true
  - id: e12
    from: n4b
    to: n4c
    tag: diff
    prompt: Forward the resulting diff plus test outputs for review.
  - id: e13
    from: n4c
    to: g2
    tag: review_outcome
    prompt: Send review outcome to verdict gate.
    sameSession: true
  - id: e14
    from: g2
    to: end1
    branch: pass
  - id: e15
    from: g2
    to: n4b
    branch: rework
    loopback: true
  - id: e16
    from: g2
    to: n4a
    branch: replan
    loopback: true
