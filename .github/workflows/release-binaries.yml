name: Release binaries

on:
  release:
    types: [published]

permissions:
  contents: write

concurrency:
  group: release-binaries-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and attach binaries
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.event.release.tag_name, 'v') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build UI
        run: bun run build:ui

      - name: Generate static UI assets
        run: bun packages/server/scripts/generate-static-ui-assets.ts

      - name: Build binaries
        run: |
          mkdir -p dist/release
          bun build --compile --target=bun-darwin-arm64 --sourcemap=none packages/cli/src/specflow.ts --outfile dist/release/specflow-darwin-arm64
          bun build --compile --target=bun-darwin-x64 --sourcemap=none packages/cli/src/specflow.ts --outfile dist/release/specflow-darwin-x64
          bun build --compile --target=bun-linux-arm64 --sourcemap=none packages/cli/src/specflow.ts --outfile dist/release/specflow-linux-arm64
          bun build --compile --target=bun-linux-x64-baseline --sourcemap=none packages/cli/src/specflow.ts --outfile dist/release/specflow-linux-x64
          bun build --compile --target=bun-windows-x64-baseline --sourcemap=none packages/cli/src/specflow.ts --outfile dist/release/specflow-windows-x64.exe

      - name: Package binaries
        working-directory: dist/release
        run: |
          chmod +x specflow-darwin-arm64 specflow-darwin-x64 specflow-linux-arm64 specflow-linux-x64
          tar -czf specflow-darwin-arm64.tar.gz specflow-darwin-arm64
          tar -czf specflow-darwin-x64.tar.gz specflow-darwin-x64
          tar -czf specflow-linux-arm64.tar.gz specflow-linux-arm64
          tar -czf specflow-linux-x64.tar.gz specflow-linux-x64
          zip -9 specflow-windows-x64.zip specflow-windows-x64.exe
          shasum -a 256 specflow-*.tar.gz specflow-*.zip > SHA256SUMS

      - name: Attach binaries to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "$TAG" \
            dist/release/specflow-darwin-arm64.tar.gz \
            dist/release/specflow-darwin-x64.tar.gz \
            dist/release/specflow-linux-arm64.tar.gz \
            dist/release/specflow-linux-x64.tar.gz \
            dist/release/specflow-windows-x64.zip \
            dist/release/SHA256SUMS \
            --clobber
